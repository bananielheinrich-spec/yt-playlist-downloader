name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install pyinstaller flask flask-cors

      - name: yt-dlp.exe herunterladen
        run: curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -o yt-dlp.exe

      - name: ffmpeg herunterladen und entpacken
        run: |
          curl -L "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $ffmpegExe = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_extracted | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName -Destination "ffmpeg.exe"
          $ffprobeExe = Get-ChildItem -Recurse -Filter "ffprobe.exe" ffmpeg_extracted | Select-Object -First 1
          Copy-Item $ffprobeExe.FullName -Destination "ffprobe.exe"

      - name: EXE bauen
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name "YT-Playlist-Downloader" `
            --add-data "index.html;." `
            --add-binary "yt-dlp.exe;." `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            --hidden-import flask `
            --hidden-import flask_cors `
            --hidden-import tkinter `
            --hidden-import tkinter.filedialog `
            --hidden-import werkzeug `
            --hidden-import werkzeug.serving `
            --hidden-import werkzeug.routing `
            app.py

      - name: EXE als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: YT-Playlist-Downloader
          path: dist/YT-Playlist-Downloader.exe

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: "YT Playlist Downloader"
          body: |
            ## ▶ YT Playlist Downloader
            **Einfach `.exe` herunterladen und doppelklicken – fertig!**
            Kein Python, kein ffmpeg, keine Installation nötig.
            - MP4 und MP3 Download
            - TV-kompatible MP4 Dateien (ffmpeg eingebaut)
          files: dist/YT-Playlist-Downloader.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
