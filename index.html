<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #313338;
            color: #dbdee1;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #2b2d31;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 { color: #f2f3f5; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #949ba4; margin-bottom: 6px; text-transform: uppercase; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background-color: #1e1f22;
            border: none;
            border-radius: 4px;
            color: #dbdee1;
            box-sizing: border-box;
        }
        input:focus { outline: 1px solid #5865f2; }
        
        .avatar-upload { text-align: center; margin-bottom: 15px; }
        .avatar-preview {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #5865f2;
            margin: 0 auto 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 20px;
            overflow: hidden;
            border: 2px solid #4752c4;
            cursor: pointer;
        }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        input[type="file"] { display: none; }

        button {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            background-color: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #4752c4; }
        
        #call-screen { display: none; }
        .user-list {
            background-color: #1e1f22;
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 5px;
            background-color: #2b2d31;
            border-radius: 4px;
        }
        .user-info { display: flex; align-items: center; }
        .avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-right: 10px;
            font-size: 12px;
            overflow: hidden;
        }
        .avatar-small img { width: 100%; height: 100%; object-fit: cover; }
        
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn-secondary { background-color: #4e5058; }
        .btn-secondary:hover { background-color: #6d6f78; }
        .btn-danger { background-color: #da373c; }
        .btn-danger:hover { background-color: #a1282c; }
        .mute-btn {
            background: none; border: none; color: #949ba4; cursor: pointer; font-size: 16px; padding: 4px 8px; width: auto; margin: 0;
        }
        .mute-btn:hover { color: white; background: none; }
        #error-msg { color: #da373c; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <!-- LOBBY -->
    <div class="container" id="lobby-screen">
        <h2>Voice Hub Lobby</h2>
        
        <div class="avatar-upload">
            <label for="avatarInput">
                <div class="avatar-preview" id="avatarPreview">VH</div>
            </label>
            <input type="file" id="avatarInput" accept="image/*">
        </div>

        <div class="input-group">
            <label>Dein Name</label>
            <input type="text" id="usernameInput" placeholder="z. B. 1Bananiel1616">
        </div>

        <div class="input-group">
            <label>Raum-Name</label>
            <input type="text" id="roomInput" placeholder="z. B. main">
        </div>

        <button id="joinBtn">Beitreten</button>
        <div id="error-msg">Dieser Name ist bereits im Raum vergeben!</div>
    </div>

    <!-- CALL SCREEN -->
    <div class="container" id="call-screen">
        <h2 id="roomTitleDisplay">Kanal</h2>
        <label>Teilnehmer</label>
        
        <div class="user-list" id="userList"></div>

        <div class="controls">
            <button id="muteSelfBtn" class="btn-secondary">Mikro aus</button>
            <button id="leaveBtn" class="btn-danger">Verlassen</button>
        </div>
    </div>

    <div id="audio-container" style="display:none;"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream;
        let isMuted = false;
        const peers = {}; // Speichert WebRTC Verbindungen

        // UI Elemente
        const lobbyScreen = document.getElementById('lobby-screen');
        const callScreen = document.getElementById('call-screen');
        const errorMsg = document.getElementById('error-msg');
        const userList = document.getElementById('userList');
        let myAvatarUrl = "";
        let myName = "";

        // Profilbild hochladen
        document.getElementById('avatarInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    myAvatarUrl = event.target.result;
                    document.getElementById('avatarPreview').innerHTML = `<img src="${myAvatarUrl}">`;
                }
                reader.readAsDataURL(file);
            }
        });

        // Beitreten
        document.getElementById('joinBtn').addEventListener('click', async () => {
            myName = document.getElementById('usernameInput').value.trim();
            const roomName = document.getElementById('roomInput').value.trim().toLowerCase();

            if (!myName || !roomName) return;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                socket.emit('join-room', roomName, myName, myAvatarUrl);
                document.getElementById('roomTitleDisplay').innerText = "Raum: " + roomName;
            } catch (err) {
                alert("Mikrofon-Zugriff verweigert!");
            }
        });

        // Server-Antworten
        socket.on('name-taken', () => {
            errorMsg.style.display = "block";
            localStream.getTracks().forEach(t => t.stop());
        });

        socket.on('room-users', (users) => {
            lobbyScreen.style.display = 'none';
            callScreen.style.display = 'block';
            errorMsg.style.display = "none";
            
            // Mich selbst hinzufügen
            addUserToUI(socket.id, myName, myAvatarUrl, true);

            // Andere hinzufügen und anrufen
            for (const id in users) {
                if (id !== socket.id) {
                    addUserToUI(id, users[id].username, users[id].avatar, false);
                    createPeerConnection(id, true);
                }
            }
        });

        socket.on('user-connected', (id, username, avatar) => {
            addUserToUI(id, username, avatar, false);
            createPeerConnection(id, false);
        });

        socket.on('user-disconnected', (id) => {
            if (peers[id]) peers[id].close();
            delete peers[id];
            const userEl = document.getElementById('user-' + id);
            if (userEl) userEl.remove();
            const audioEl = document.getElementById('audio-' + id);
            if (audioEl) audioEl.remove();
        });

        // WebRTC Logik
        function createPeerConnection(id, isCaller) {
            const peer = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            peers[id] = peer;

            localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

            peer.ontrack = (event) => {
                let audio = document.getElementById('audio-' + id);
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = 'audio-' + id;
                    audio.autoplay = true;
                    document.getElementById('audio-container').appendChild(audio);
                }
                audio.srcObject = event.streams[0];
            };

            peer.onicecandidate = (event) => {
                if (event.candidate) socket.emit('candidate', id, event.candidate);
            };

            if (isCaller) {
                peer.createOffer().then(offer => {
                    peer.setLocalDescription(offer);
                    socket.emit('offer', id, offer);
                });
            }
        }

        socket.on('offer', (id, description) => {
            peers[id].setRemoteDescription(description)
                .then(() => peers[id].createAnswer())
                .then(answer => {
                    peers[id].setLocalDescription(answer);
                    socket.emit('answer', id, answer);
                });
        });

        socket.on('answer', (id, description) => {
            peers[id].setRemoteDescription(description);
        });

        socket.on('candidate', (id, candidate) => {
            peers[id].addIceCandidate(new RTCIceCandidate(candidate));
        });

        // UI Hilfsfunktionen
        function addUserToUI(id, name, avatarUrl, isMe) {
            if (document.getElementById('user-' + id)) return;
            
            const div = document.createElement('div');
            div.className = 'user-item';
            div.id = 'user-' + id;
            
            const avatarContent = avatarUrl ? `<img src="${avatarUrl}">` : name.substring(0, 2).toUpperCase();
            const muteButtonHtml = !isMe ? `<button class="mute-btn" onclick="toggleRemoteMute('${id}')" id="mute-icon-${id}">🔊</button>` : '';

            div.innerHTML = `
                <div class="user-info">
                    <div class="avatar-small">${avatarContent}</div>
                    <div><strong>${name}</strong> ${isMe ? '(Du)' : ''}</div>
                </div>
                ${muteButtonHtml}
            `;
            userList.appendChild(div);
        }

        // Steuerung
        document.getElementById('muteSelfBtn').addEventListener('click', () => {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            const btn = document.getElementById('muteSelfBtn');
            btn.innerText = isMuted ? "Mikro an" : "Mikro aus";
            btn.style.backgroundColor = isMuted ? "#da373c" : "#4e5058";
        });

        window.toggleRemoteMute = function(id) {
            const audio = document.getElementById('audio-' + id);
            const icon = document.getElementById('mute-icon-' + id);
            if (audio) {
                audio.muted = !audio.muted;
                icon.innerText = audio.muted ? "🔇" : "🔊";
            }
        };

        document.getElementById('leaveBtn').addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
