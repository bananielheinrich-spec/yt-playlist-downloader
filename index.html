<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangout Hub</title>
    <!-- PeerJS für zuverlässige P2P Audioverbindung -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #313338;
            --container-bg: #2b2d31;
            --container-hover: #35373c;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --error: #ed4245;
            --success: #23a559;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            display: none;
        }

        .screen.active {
            display: block;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            background-color: #1e1f22;
            border: none;
            border-radius: 4px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            outline: 2px solid var(--accent);
        }

        input:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .verify-box {
            background: #1e1f22;
            padding: 12px;
            border-radius: 4px;
            margin: 15px 0;
            font-size: 13px;
            text-align: left;
            border-left: 4px solid var(--accent);
        }

        .code-display {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 2px;
            margin: 5px 0;
            user-select: all;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-leave {
            background-color: var(--error);
            margin-top: 20px;
        }
        
        .btn-leave:hover {
            background-color: #c93b3e;
        }

        .error-msg {
            color: var(--error);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        #chat-screen {
            max-width: 800px;
            width: 90%;
            height: 80vh;
            display: none;
            flex-direction: column;
        }

        #chat-screen.active {
            display: flex;
        }

        .participants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
        }

        .participant-card {
            background-color: var(--bg-color);
            border-radius: var(--border-radius);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--container-hover);
            margin-bottom: 10px;
            object-fit: cover;
        }

        .participant-name {
            font-weight: bold;
            font-size: 14px;
            word-break: break-all;
            text-align: center;
        }

        .icon-btn {
            margin-top: 10px;
            background-color: var(--container-hover);
            padding: 8px;
            font-size: 12px;
            width: auto;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background-color: #3f4248;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--bg-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen active">
        <h1>Hangout Hub</h1>
        
        <div class="input-group">
            <label for="roblox-name">Roblox Benutzername</label>
            <input type="text" id="roblox-name" placeholder="Dein Roblox Name" autocomplete="off">
        </div>

        <div id="verify-container">
            <div class="verify-box">
                <strong>Eigentums-Nachweis:</strong>
                <div>Schreibe diesen Code irgendwo in deine Roblox-Bio ("Über mich"), z.B. neben ein "Hallo":</div>
                <div id="verify-code" class="code-display">HUB-----</div>
                <small style="color: var(--text-muted)">Nach dem Verbinden kannst du ihn wieder löschen.</small>
            </div>
        </div>

        <button id="join-btn">Beitreten</button>
        <div id="error-text" class="error-msg"></div>
    </div>

    <!-- VOICE CHAT SCREEN -->
    <div id="chat-screen" class="screen">
        <h1>Hangout Hub - Global</h1>
        
        <div class="participants-grid" id="participants-list"></div>

        <div class="controls">
            <button id="toggle-mic-btn">
                <svg id="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                <span id="mic-text">Mikrofon ausschalten</span>
            </button>
            <button id="leave-btn" class="btn-leave">Verlassen</button>
        </div>
    </div>

    <script>
        let localStream = null;
        let peer = null;
        let myIndex = 0;
        const MAX_PEERS = 30;
        const GLOBAL_ROOM = 'global-hub';
        let myInfo = { name: '', avatar: '' };
        let peers = {};
        let discoveryInterval = null;

        const lobbyScreen = document.getElementById('lobby-screen');
        const chatScreen = document.getElementById('chat-screen');
        const joinBtn = document.getElementById('join-btn');
        const errorText = document.getElementById('error-text');
        const participantsList = document.getElementById('participants-list');
        const toggleMicBtn = document.getElementById('toggle-mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const micText = document.getElementById('mic-text');
        const leaveBtn = document.getElementById('leave-btn');
        const verifyContainer = document.getElementById('verify-container');
        const robloxInput = document.getElementById('roblox-name');

        const generatedCode = 'HUB-' + Math.floor(1000 + Math.random() * 9000);

        function checkSavedUser() {
            const savedUser = localStorage.getItem('hangout_hub_user');
            if (savedUser) {
                try {
                    myInfo = JSON.parse(savedUser);
                    robloxInput.value = myInfo.name;
                    robloxInput.disabled = true;
                    joinBtn.innerText = "Verbinden";

                    verifyContainer.innerHTML = `
                        <div class="verify-box" style="border-left-color: var(--success); display: flex; align-items: center; gap: 12px; text-align: left;">
                            <img src="${myInfo.avatar}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                            <div style="flex-grow: 1;">
                                <div style="font-weight: bold; color: #fff;">Eingeloggt als ${myInfo.name}</div>
                                <a href="#" id="logout-link" style="color: var(--accent); font-size: 12px; text-decoration: underline;">Anderen Account nutzen</a>
                            </div>
                        </div>
                    `;

                    document.getElementById('logout-link').addEventListener('click', (e) => {
                        e.preventDefault();
                        localStorage.removeItem('hangout_hub_user');
                        location.reload();
                    });
                } catch (e) {
                    localStorage.removeItem('hangout_hub_user');
                }
            } else {
                document.getElementById('verify-code').innerText = generatedCode;
            }
        }

        checkSavedUser();

        async function fetchRobloxData(url) {
            const proxies = [
                'https://corsproxy.io/?',
                'https://api.allorigins.win/raw?url='
            ];
            for (let proxy of proxies) {
                try {
                    const res = await fetch(proxy + encodeURIComponent(url));
                    if (res.ok) return await res.json();
                } catch (e) {
                    continue;
                }
            }
            return null;
        }

        async function verifyRobloxAccount(username) {
            const searchData = await fetchRobloxData(`https://users.roblox.com/v1/users/search?keyword=${encodeURIComponent(username)}&limit=10`);
            if (!searchData || !searchData.data) return { error: "Verbindungsfehler zur Roblox API." };

            const user = searchData.data.find(u => u.name.toLowerCase() === username.toLowerCase());
            if (!user) return { error: "Dieser Roblox-Account existiert nicht." };

            // Cache-Busting (?_timestamp) angehängt, damit die aktuelle Bio sofort ohne Verzögerung erkannt wird
            const userDetails = await fetchRobloxData(`https://users.roblox.com/v1/users/${user.id}?_=${Date.now()}`);
            if (!userDetails || !userDetails.description || !userDetails.description.includes(generatedCode)) {
                return { error: `Code '${generatedCode}' wurde nicht in deiner Roblox-Bio gefunden!` };
            }

            const avatarData = await fetchRobloxData(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${user.id}&size=150x150&format=Png&isCircular=true`);
            const avatarUrl = (avatarData && avatarData.data && avatarData.data[0]) ? avatarData.data[0].imageUrl : '';

            return { name: user.name, avatar: avatarUrl };
        }

        joinBtn.addEventListener('click', async () => {
            const savedUser = localStorage.getItem('hangout_hub_user');

            if (!savedUser) {
                const username = robloxInput.value.trim();
                if (!username) {
                    showError("Bitte gib deinen Roblox-Namen ein.");
                    return;
                }

                joinBtn.disabled = true;
                joinBtn.innerText = "Prüfe Roblox Bio...";
                errorText.style.display = 'none';

                const verification = await verifyRobloxAccount(username);
                if (verification.error) {
                    showError(verification.error);
                    joinBtn.disabled = false;
                    joinBtn.innerText = "Beitreten";
                    return;
                }

                myInfo = { name: verification.name, avatar: verification.avatar };
                localStorage.setItem('hangout_hub_user', JSON.stringify(myInfo));
            }

            try {
                joinBtn.innerText = "Starte Mikrofon...";
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

                lobbyScreen.classList.remove('active');
                chatScreen.classList.add('active');

                initMeshNetwork(0);
            } catch (err) {
                showError("Mikrofon-Zugriff fehlgeschlagen.");
                joinBtn.disabled = false;
                joinBtn.innerText = savedUser ? "Verbinden" : "Beitreten";
            }
        });

        function showError(msg) {
            errorText.innerText = msg;
            errorText.style.display = 'block';
        }

        function initMeshNetwork(index) {
            if (index > MAX_PEERS) {
                alert("Raum ist voll.");
                location.reload();
                return;
            }

            const myId = `hghub-${GLOBAL_ROOM}-${index}`;
            peer = new Peer(myId);

            peer.on('open', (id) => {
                myIndex = index;
                addParticipantToUI(myInfo.name, myInfo.avatar, id, true);
                discoveryInterval = setInterval(syncPeers, 3000);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    initMeshNetwork(index + 1);
                }
            });

            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'sync') {
                        peers[conn.peer] = { conn, info: data.info };
                        addParticipantToUI(data.info.name, data.info.avatar, conn.peer, false);
                        conn.send({ type: 'sync-ack', info: myInfo });
                    } 
                    else if (data.type === 'sync-ack') {
                        peers[conn.peer] = { conn, info: data.info };
                        addParticipantToUI(data.info.name, data.info.avatar, conn.peer, false);
                        
                        const remoteIndex = parseInt(conn.peer.split('-').pop());
                        if (myIndex < remoteIndex) {
                            peer.call(conn.peer, localStream);
                        }
                    }
                });
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    let audio = document.getElementById(`audio-${call.peer}`);
                    if (!audio) {
                        audio = document.createElement('audio');
                        audio.id = `audio-${call.peer}`;
                        audio.autoplay = true;
                        document.body.appendChild(audio);
                    }
                    audio.srcObject = remoteStream;
                });
            });
        }

        function syncPeers() {
            for (let i = 0; i <= MAX_PEERS; i++) {
                if (i === myIndex) continue;
                const targetId = `hghub-${GLOBAL_ROOM}-${i}`;
                
                if (!peers[targetId] || !peers[targetId].conn || !peers[targetId].conn.open) {
                    const conn = peer.connect(targetId);
                    conn.on('open', () => {
                        conn.send({ type: 'sync', info: myInfo });
                    });
                }
            }
        }

        function addParticipantToUI(name, avatarUrl, peerId, isMe) {
            if (document.getElementById(`card-${peerId}`)) return;

            const card = document.createElement('div');
            card.className = 'participant-card';
            card.id = `card-${peerId}`;

            const img = document.createElement('img');
            img.className = 'avatar';
            img.src = avatarUrl || 'https://tr.rbxcdn.com/30bf3239a58495a882a4d52e505a74e5/150/150/AvatarHeadshot/Png';

            const nameEl = document.createElement('div');
            nameEl.className = 'participant-name';
            nameEl.innerText = name + (isMe ? " (Du)" : "");

            card.appendChild(img);
            card.appendChild(nameEl);

            if (!isMe) {
                const muteBtn = document.createElement('button');
                muteBtn.className = 'icon-btn';
                muteBtn.title = 'Teilnehmer stummschalten';
                muteBtn.innerHTML = `
                    <svg class="speaker-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                `;
                
                let isMuted = false;
                muteBtn.onclick = () => {
                    const audioEl = document.getElementById(`audio-${peerId}`);
                    if (audioEl) {
                        isMuted = !isMuted;
                        audioEl.muted = isMuted;
                        muteBtn.style.backgroundColor = isMuted ? 'var(--error)' : 'var(--container-hover)';
                        if (isMuted) {
                            muteBtn.innerHTML = `
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                    <path d="M9 9v6h3l5 5V4L12 9H9z"></path>
                                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                                </svg>
                            `;
                        } else {
                            muteBtn.innerHTML = `
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                                </svg>
                            `;
                        }
                    }
                };
                card.appendChild(muteBtn);
            }

            participantsList.appendChild(card);
        }

        let micEnabled = true;
        toggleMicBtn.addEventListener('click', () => {
            if (localStream) {
                micEnabled = !micEnabled;
                localStream.getAudioTracks()[0].enabled = micEnabled;
                
                if (micEnabled) {
                    micIcon.innerHTML = `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line>`;
                    micText.innerText = "Mikrofon ausschalten";
                    toggleMicBtn.style.backgroundColor = "var(--accent)";
                } else {
                    micIcon.innerHTML = `<line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.68-1.4"></path><path d="M19 10v1a7 7 0 0 1-12.57 4.38"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line>`;
                    micText.innerText = "Mikrofon einschalten";
                    toggleMicBtn.style.backgroundColor = "var(--error)";
                }
            }
        });

        leaveBtn.addEventListener('click', () => {
            if (peer) peer.destroy();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (discoveryInterval) clearInterval(discoveryInterval);
            
            participantsList.innerHTML = '';
            peers = {};

            chatScreen.classList.remove('active');
            lobbyScreen.classList.add('active');
            joinBtn.disabled = false;
            joinBtn.innerText = "Verbinden";
        });
    </script>
</body>
</html>
