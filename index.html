<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>YT Playlist Downloader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg:      #09090b;
      --s1:      #111114;
      --s2:      #18181c;
      --s3:      #222228;
      --border:  #2a2a32;
      --red:     #ef4444;
      --orange:  #f97316;
      --green:   #22c55e;
      --yellow:  #eab308;
      --blue:    #3b82f6;
      --text:    #f4f4f5;
      --muted:   #71717a;
      --muted2:  #52525b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--red) 0%, var(--orange) 100%);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 32px rgba(239,68,68,.4), 0 0 64px rgba(239,68,68,.1);
    }
    .logo-text h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--text);
    }
    .logo-text p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 700px;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
    }

    /* server warn */
    .warn-box {
      background: rgba(234,179,8,.07);
      border: 1px solid rgba(234,179,8,.2);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 28px;
      font-size: 0.8rem;
      color: var(--yellow);
      line-height: 1.6;
    }
    .warn-box code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: rgba(234,179,8,.12);
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 22px; }
    .field-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .field-label .dot {
      width: 5px; height: 5px;
      background: var(--red);
      border-radius: 50%;
    }

    input[type="url"], input[type="text"] {
      width: 100%;
      background: var(--s2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.84rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239,68,68,.12);
    }
    input::placeholder { color: var(--muted2); }

    /* folder row */
    .folder-row { display: flex; gap: 8px; }
    .folder-row input { flex: 1; }
    .btn-folder {
      background: var(--s2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 0 16px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .btn-folder:hover { border-color: var(--red); background: var(--s3); }

    /* format tabs */
    .fmt-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .fmt-btn {
      background: var(--s2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .fmt-btn:hover { border-color: var(--muted2); color: var(--text); }
    .fmt-btn.active {
      background: rgba(239,68,68,.1);
      border-color: var(--red);
      color: var(--text);
    }

    /* ── PREVIEW ── */
    .preview {
      background: var(--s2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      transition: all .3s;
      overflow: hidden;
    }
    .preview.hidden { display: none; }
    .preview-thumb {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .preview-info { flex: 1; min-width: 0; }
    .preview-title {
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .preview-sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
    .preview-count {
      background: linear-gradient(135deg, var(--red), var(--orange));
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── DOWNLOAD BUTTON ── */
    .btn-dl {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--red) 0%, var(--orange) 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -.01em;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 24px rgba(239,68,68,.35);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-dl:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(239,68,68,.5);
    }
    .btn-dl:active:not(:disabled) { transform: translateY(0); }
    .btn-dl:disabled { opacity: .5; cursor: not-allowed; }

    /* ── PROGRESS SECTION ── */
    .progress-section {
      margin-top: 28px;
      display: none;
    }
    .progress-section.visible { display: block; }

    /* Current video */
    .current-video {
      background: var(--s2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .current-spinner {
      width: 24px; height: 24px;
      border: 2.5px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .current-info { flex: 1; min-width: 0; }
    .current-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .current-name {
      font-size: 0.87rem;
      font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .current-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--orange);
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Bars */
    .bars { margin-bottom: 16px; }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .bar-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      width: 80px;
      flex-shrink: 0;
    }
    .bar-bg {
      flex: 1;
      background: var(--s3);
      border-radius: 99px;
      height: 7px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width .35s ease;
    }
    .bar-fill.red    { background: linear-gradient(90deg, var(--red), var(--orange)); }
    .bar-fill.orange { background: linear-gradient(90deg, var(--orange), #fbbf24); }
    .bar-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      width: 42px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-box {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }
    .stat-key {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* Log */
    .log-box {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      height: 160px;
      overflow-y: auto;
      line-height: 1.7;
    }
    .log-line { }
    .log-line.dl   { color: #60a5fa; }
    .log-line.ok   { color: var(--green); font-weight: 600; }
    .log-line.err  { color: var(--red); }
    .log-line.dest { color: var(--orange); }

    .log-box::-webkit-scrollbar { width: 4px; }
    .log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── BANNERS ── */
    .banner {
      margin-top: 18px;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .banner.visible { display: flex; }
    .banner.ok  { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
    .banner.err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); }

    /* divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-icon">▶</div>
    <div class="logo-text">
      <h1>Playlist Downloader</h1>
      <p>YouTube-Playlists als MP4 oder MP3 speichern</p>
    </div>
  </div>
</div>

<div class="card">

  <div class="warn-box">
    ⚠
    <span>Server muss laufen: <code>python server.py</code> → dann diese Seite öffnen</span>
  </div>

  <!-- URL -->
  <div class="field">
    <div class="field-label"><span class="dot"></span>Playlist-URL</div>
    <input type="url" id="urlInput" placeholder="https://www.youtube.com/playlist?list=..."/>
  </div>

  <!-- Format -->
  <div class="field">
    <div class="field-label"><span class="dot"></span>Format</div>
    <div class="fmt-row">
      <button class="fmt-btn active" data-fmt="mp4">🎬 Video (MP4)</button>
      <button class="fmt-btn"        data-fmt="mp3">🎵 Audio (MP3)</button>
    </div>
  </div>

  <!-- Ordner -->
  <div class="field">
    <div class="field-label"><span class="dot"></span>Zielordner</div>
    <div class="folder-row">
      <input type="text" id="folderInput" placeholder="Ordner wählen oder Pfad eingeben…"/>
      <button class="btn-folder" id="btnFolder">📂 Durchsuchen</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview hidden" id="preview">
    <div class="preview-thumb">📋</div>
    <div class="preview-info">
      <div class="preview-title" id="previewTitle">—</div>
      <div class="preview-sub" id="previewSub">—</div>
    </div>
    <div class="preview-count" id="previewCount">0</div>
  </div>

  <!-- Button -->
  <button class="btn-dl" id="btnDl">
    <span>⬇</span><span>Alle Videos herunterladen</span>
  </button>

  <!-- Progress -->
  <div class="progress-section" id="progressSection">
    <hr class="divider"/>

    <!-- Aktuelles Video -->
    <div class="current-video" id="currentVideo">
      <div class="current-spinner"></div>
      <div class="current-info">
        <div class="current-label">Aktuell</div>
        <div class="current-name" id="currentName">Warte…</div>
      </div>
      <div class="current-num" id="currentNum">—</div>
    </div>

    <!-- Balken -->
    <div class="bars">
      <!-- Aktuelles Video -->
      <div class="bar-row">
        <div class="bar-label">Video</div>
        <div class="bar-bg"><div class="bar-fill red" id="barVideo"></div></div>
        <div class="bar-pct" id="pctVideo">0%</div>
      </div>
      <!-- Gesamt -->
      <div class="bar-row">
        <div class="bar-label">Gesamt</div>
        <div class="bar-bg"><div class="bar-fill orange" id="barTotal"></div></div>
        <div class="bar-pct" id="pctTotal">0%</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val" id="statDone">0</div>
        <div class="stat-key">Fertig</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statTotal">?</div>
        <div class="stat-key">Gesamt</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statSpeed">—</div>
        <div class="stat-key">Speed</div>
      </div>
    </div>

    <!-- Log -->
    <div class="log-box" id="logBox"></div>
  </div>

  <!-- Banners -->
  <div class="banner ok"  id="bannerOk">✅ Alle Videos erfolgreich heruntergeladen!</div>
  <div class="banner err" id="bannerErr">❌ <span id="errMsg">Fehler</span></div>

</div>

<script>
const API = (location.protocol === "file:" ? "http://localhost:5757" : "") + "/api";
let fmt = "mp4";
let totalVideos = 0;
let doneVideos  = 0;

/* Format tabs */
document.querySelectorAll(".fmt-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".fmt-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    fmt = b.dataset.fmt;
  });
});

/* Ordner-Picker – ruft Server auf, der tkinter dialog öffnet */
document.getElementById("btnFolder").addEventListener("click", async () => {
  try {
    const res = await fetch(`${API}/pick-folder`);
    const data = await res.json();
    if (data.folder) {
      document.getElementById("folderInput").value = data.folder;
    }
  } catch {
    alert("Server nicht erreichbar – starte python server.py!");
  }
});

/* URL-Preview */
const urlInput = document.getElementById("urlInput");
urlInput.addEventListener("blur",  fetchPreview);
urlInput.addEventListener("keydown", e => { if (e.key === "Enter") fetchPreview(); });

async function fetchPreview() {
  const url = urlInput.value.trim();
  if (!url) return;
  const box = document.getElementById("preview");
  box.classList.remove("hidden");
  document.getElementById("previewTitle").textContent = "Lade…";
  document.getElementById("previewSub").textContent   = "";
  document.getElementById("previewCount").textContent = "…";
  try {
    const r = await fetch(`${API}/preview`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({url})
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    totalVideos = d.count;
    document.getElementById("previewTitle").textContent = d.title;
    document.getElementById("previewSub").textContent   = d.uploader ? `von ${d.uploader}` : "";
    document.getElementById("previewCount").textContent = `${d.count} Videos`;
    document.getElementById("statTotal").textContent    = d.count;
  } catch (e) {
    document.getElementById("previewTitle").textContent = "Fehler";
    document.getElementById("previewSub").textContent   = e.message;
    document.getElementById("previewCount").textContent = "?";
  }
}

/* Download */
document.getElementById("btnDl").addEventListener("click", startDownload);

async function startDownload() {
  const url    = urlInput.value.trim();
  const folder = document.getElementById("folderInput").value.trim();
  if (!url)    { alert("Bitte eine Playlist-URL eingeben!"); return; }
  if (!folder) { alert("Bitte einen Zielordner wählen!"); return; }

  // Reset
  doneVideos = 0;
  const btn = document.getElementById("btnDl");
  btn.disabled = true;
  btn.innerHTML = `<span style="display:inline-block;animation:spin .7s linear infinite;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;width:18px;height:18px;"></span><span>Wird heruntergeladen…</span>`;
  document.getElementById("progressSection").classList.add("visible");
  document.getElementById("bannerOk").classList.remove("visible");
  document.getElementById("bannerErr").classList.remove("visible");
  document.getElementById("logBox").innerHTML = "";
  setBar("barVideo", "pctVideo", 0);
  setBar("barTotal", "pctTotal", 0);
  document.getElementById("statDone").textContent  = "0";
  document.getElementById("statTotal").textContent = totalVideos || "?";
  document.getElementById("statSpeed").textContent = "—";
  document.getElementById("currentName").textContent = "Verbinde…";
  document.getElementById("currentNum").textContent  = "—";

  try {
    const res = await fetch(`${API}/download`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({url, folder, format: fmt, total: totalVideos})
    });
    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.error || "Server-Fehler");
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const chunks = buffer.split("\n\n");
      buffer = chunks.pop();
      for (const chunk of chunks) {
        if (!chunk.startsWith("data:")) continue;
        try {
          const msg = JSON.parse(chunk.replace(/^data:\s*/, ""));
          if (msg.line) parseLine(msg.line);
          if (msg.done) {
            if (msg.success) {
              document.getElementById("bannerOk").classList.add("visible");
              setBar("barTotal", "pctTotal", 100);
              document.getElementById("currentName").textContent = "Fertig! 🎉";
            } else {
              showErr("Download fehlgeschlagen");
            }
          }
        } catch {}
      }
    }
  } catch (e) {
    const msg = e.message.includes("fetch")
      ? "Server nicht erreichbar – starte python server.py!"
      : e.message;
    showErr(msg);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<span>⬇</span><span>Alle Videos herunterladen</span>`;
  }
}

/* ── Parser ── */
function parseLine(line) {
  addLog(line);

  // Fortschritt aktuelles Video: [download]  47.5% of ...
  const pctM = line.match(/\[download\]\s+(\d+(?:\.\d+)?)%\s+of\s+([\d.]+\w+)\s+at\s+([\d.]+\w+\/s)/);
  if (pctM) {
    const pct   = parseFloat(pctM[1]);
    const speed = pctM[3];
    setBar("barVideo", "pctVideo", pct);
    document.getElementById("statSpeed").textContent = speed;
    return;
  }

  // Destination (neues Video startet)
  const destM = line.match(/\[download\] Destination: .+[\\\/](.+)$/);
  if (destM) {
    const filename = destM[1];
    document.getElementById("currentName").textContent = filename;
    setBar("barVideo", "pctVideo", 0);
    return;
  }

  // Video fertig (100% oder "has already been downloaded")
  if (line.match(/\[download\] 100%/) || line.includes("has already been downloaded")) {
    doneVideos++;
    document.getElementById("statDone").textContent = doneVideos;
    const total = totalVideos || 1;
    setBar("barTotal", "pctTotal", Math.round((doneVideos / total) * 100));
    document.getElementById("currentNum").textContent = `${doneVideos}/${total}`;
    return;
  }

  // Merging / ffmpeg
  if (line.includes("[ffmpeg]") || line.includes("Merging")) {
    document.getElementById("currentName").textContent = "🔀 Zusammenführen…";
    return;
  }

  // Playlist-Index aus yt-dlp output: [youtube] Downloading item X of Y
  const idxM = line.match(/Downloading item (\d+) of (\d+)/);
  if (idxM) {
    const cur   = parseInt(idxM[1]);
    const total = parseInt(idxM[2]);
    if (!totalVideos) {
      totalVideos = total;
      document.getElementById("statTotal").textContent = total;
    }
    document.getElementById("currentNum").textContent = `${cur}/${total}`;
  }
}

function setBar(barId, pctId, pct) {
  document.getElementById(barId).style.width = pct + "%";
  document.getElementById(pctId).textContent = Math.round(pct) + "%";
}

function addLog(line) {
  const box = document.getElementById("logBox");
  const div = document.createElement("div");
  div.className = "log-line";
  if (line.includes("[download]") && line.includes("%")) div.className += " dl";
  else if (line.includes("Destination") || line.includes("[ffmpeg]"))  div.className += " dest";
  else if (line.toLowerCase().includes("error"))   div.className += " err";
  else if (line.includes("100%") || line.includes("already been")) div.className += " ok";
  div.textContent = line;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showErr(msg) {
  document.getElementById("errMsg").textContent = msg;
  document.getElementById("bannerErr").classList.add("visible");
}
</script>
