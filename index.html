<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau lernen (Roblox Edition)</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #252538;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa; /* Roblox Studio Blau-Touch */
            --success-color: #a6e3a1;
            --error-color: #f38ba8;
            --viewport-bg: #181825;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header & Avatar */
        header {
            background-color: var(--panel-bg);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #313244;
            height: 140px;
        }

        .teacher-speech {
            background: #313244;
            padding: 15px;
            border-radius: 10px;
            max-width: 75%;
            position: relative;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .teacher-speech code {
            background: #11111b;
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--success-color);
        }

        .teacher-speech::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 10px 0 10px 10px;
            border-style: solid;
            border-color: transparent transparent transparent #313244;
        }

        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 120px;
        }

        .avatar {
            width: 65px;
            height: 65px;
            background-color: var(--accent-color);
            border-radius: 20%; /* Etwas eckiger, wie ein Roblox-Kopf */
            position: relative;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(137, 180, 250, 0.4);
        }

        .avatar::before, .avatar::after {
            content: '';
            position: absolute;
            top: 25px;
            width: 10px;
            height: 10px;
            background-color: #11111b;
            border-radius: 50%;
            animation: blink 4s infinite;
        }
        .avatar::before { left: 14px; }
        .avatar::after { right: 14px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .avatar-name {
            font-size: 0.9rem;
            margin-top: 8px;
            color: var(--accent-color);
            font-weight: bold;
        }

        /* Arbeitsbereich */
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 140px);
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h2 { color: var(--accent-color); font-size: 1.1rem; }

        /* Code Editor */
        textarea {
            width: 100%;
            flex: 1;
            background-color: #11111b;
            color: #a6e3a1;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 1.1rem;
            padding: 15px;
            border: 2px solid #313244;
            border-radius: 8px;
            resize: none;
            outline: none;
            line-height: 1.4;
        }

        textarea:focus { border-color: var(--accent-color); }

        button {
            background-color: var(--accent-color);
            color: #11111b;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { filter: brightness(1.2); }

        /* Roblox Viewport (GUI Simulator) */
        .viewport-container {
            flex: 2; /* Nimmt mehr Platz ein */
            background-image: 
                linear-gradient(#252538 1px, transparent 1px),
                linear-gradient(90deg, #252538 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: var(--viewport-bg);
            border: 2px solid #313244;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .viewport-title {
            position: absolute;
            top: 5px;
            left: 10px;
            color: #6c7086;
            font-size: 0.8rem;
            font-family: sans-serif;
            z-index: 10;
        }

        /* Konsole */
        .output-box {
            flex: 1;
            background-color: #11111b;
            border: 2px solid #313244;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            white-space: pre-wrap;
            overflow-y: auto;
        }

        .success { color: var(--success-color); }
        .error { color: var(--error-color); }
        .system { color: #89dceb; }
    </style>
</head>
<body>

    <header>
        <div class="teacher-speech" id="bubble">
            Lade Luau-Lektionen...
        </div>
        <div class="avatar-container">
            <div class="avatar" id="avatar"></div>
            <div class="avatar-name">Dev-Bot</div>
        </div>
    </header>

    <div class="main-container">
        <!-- Editor -->
        <div class="left-panel">
            <h2>Luau Skript:</h2>
            <textarea id="codeEditor" spellcheck="false">print("Hallo Roblox!")</textarea>
            <button onclick="runCode()">▶ Skript ausführen</button>
        </div>

        <!-- Visueller Output & Konsole -->
        <div class="right-panel">
            <h2>Roblox Screen / GUI:</h2>
            <div class="viewport-container" id="viewport">
                <span class="viewport-title">StarterGui Viewport</span>
                <!-- Hier spawnen die simulierten Roblox GUIs -->
            </div>
            
            <h2>Output (Konsole):</h2>
            <div class="output-box" id="output">Warte auf Skript...</div>
        </div>
    </div>

    <script>
        // Die Lektionen-Datenbank
        const lessons = [
            {
                text: "Willkommen im Studio! Lass uns testen, ob die Konsole geht. Nutze <code>print(\"Dein Text\")</code> um etwas auszugeben.",
                check: (code, out, html) => code.includes("print") && out.trim().length > 0
            },
            {
                text: "Sehr gut! Variablen speichern Daten. Erstelle eine Variable: <code>local spieler = \"Daniel\"</code> und printe sie aus.",
                check: (code, out, html) => code.includes("local") && code.includes("spieler") && out.includes("Daniel")
            },
            {
                text: "Perfekt. Jetzt probieren wir einen Loop (Schleife). Zähle von 1 bis 5: <br><code>for i = 1, 5 do<br>&nbsp;&nbsp;print(i)<br>end</code>",
                check: (code, out, html) => code.includes("for") && out.includes("1") && out.includes("5")
            },
            {
                text: "Stark! Jetzt if-Bedingungen. Erstelle <code>local admin = true</code>. Schreibe danach: <br><code>if admin then print(\"Willkommen\") end</code>",
                check: (code, out, html) => code.includes("if") && code.includes("then") && out.includes("Willkommen")
            },
            {
                text: "Jetzt wird's visuell! Wir machen ein GUI. Erstelle einen Frame im Viewport rechts:<br><code>local frame = Instance.new(\"Frame\")</code>",
                check: (code, out, html) => html.includes("background-color: white") || code.includes("Instance.new(\"Frame\")")
            },
            {
                text: "Klasse, der Frame ist da! Lass uns die Farbe ändern. Füge das deinem Skript hinzu:<br><code>frame.BackgroundColor3 = Color3.fromRGB(255, 0, 0)</code>",
                check: (code, out, html) => code.includes("BackgroundColor3") && code.includes("Color3")
            },
            {
                text: "Super! Jetzt noch ein Text-Label. Ersetze Frame durch TextLabel und gib ihm einen Text:<br><code>local text = Instance.new(\"TextLabel\")<br>text.Text = \"Mein Simulator\"</code>",
                check: (code, out, html) => code.includes("Instance.new(\"TextLabel\")") && code.includes("Text =")
            },
            {
                text: "Du bist ein Meister-Scripter! Du hast die Basics drauf. Ab hier kannst du frei programmieren, GUIs bauen und testen!",
                check: () => false // Sandbox Modus
            }
        ];

        let currentLevel = 0;
        const bubble = document.getElementById('bubble');
        const avatar = document.getElementById('avatar');
        const outputBox = document.getElementById('output');
        const viewport = document.getElementById('viewport');
        
        // Start Lektion setzen
        bubble.innerHTML = lessons[currentLevel].text;

        function runCode() {
            const code = document.getElementById('codeEditor').value;
            
            // Konsole & Viewport zurücksetzen
            outputBox.innerHTML = "";
            let consoleLogs = [];
            
            // Viewport resetten, aber den Titel behalten
            viewport.innerHTML = '<span class="viewport-title">StarterGui Viewport</span>';
            
            let instances = {}; // Speichert unsere simulierten GUI-Elemente

            try {
                const lines = code.split('\n');

                // Einfacher Parser für Luau-Syntax
                lines.forEach(line => {
                    line = line.trim();
                    if(line === "") return;

                    // 1. FOR-Schleife simulieren
                    const forMatch = line.match(/for\s+(\w+)\s*=\s*(\d+)\s*,\s*(\d+)\s*do/);
                    if (forMatch && code.includes("print(" + forMatch[1] + ")")) {
                        let start = parseInt(forMatch[2]);
                        let end = parseInt(forMatch[3]);
                        for(let i=start; i<=end; i++) {
                            consoleLogs.push(i);
                        }
                    }

                    // 2. IF-Bedingung simulieren (sehr simpel)
                    if (line.includes("if ") && line.includes("then") && line.includes("print(")) {
                        let printContent = line.match(/print\("([^"]+)"\)/);
                        if (printContent) consoleLogs.push(printContent[1]);
                    }

                    // 3. Normales Print
                    if (line.startsWith("print(") && !line.includes("if ") && !line.includes("for ")) {
                        let content = line.match(/\(([^)]+)\)/);
                        if (content) {
                            let text = content[1].replace(/["']/g, "");
                            // Check ob es eine Variable ist (rudimentär)
                            let isVar = code.match(new RegExp(`local\\s+${text}\\s*=\\s*"([^"]+)"`));
                            if (isVar) text = isVar[1];
                            
                            consoleLogs.push(text);
                        }
                    }

                    // ==========================================
                    // ROBLOX GUI SIMULATOR ENGINE
                    // ==========================================

                    // Instance.new() erkennen
                    let instanceMatch = line.match(/local\s+(\w+)\s*=\s*Instance\.new\("([^"]+)"\)/);
                    if (instanceMatch) {
                        let varName = instanceMatch[1];
                        let type = instanceMatch[2];
                        
                        let el = document.createElement('div');
                        el.style.position = 'absolute';
                        el.style.left = '50px'; // Standard-Position
                        el.style.top = '50px';
                        
                        if (type === 'Frame') {
                            el.style.backgroundColor = 'white';
                            el.style.width = '100px';
                            el.style.height = '100px';
                        } 
                        else if (type === 'TextLabel' || type === 'TextButton') {
                            el.style.backgroundColor = type === 'TextButton' ? '#e2e2e2' : 'transparent';
                            el.style.color = 'white';
                            el.style.width = '150px';
                            el.style.height = '50px';
                            el.style.display = 'flex';
                            el.style.alignItems = 'center';
                            el.style.justifyContent = 'center';
                            el.style.fontFamily = 'sans-serif';
                            el.style.fontWeight = 'bold';
                            el.innerText = 'Label';
                            el.style.border = type === 'TextButton' ? '2px solid #555' : 'none';
                        }
                        
                        viewport.appendChild(el);
                        instances[varName] = el;
                        consoleLogs.push(`[System] ${type} erstellt.`);
                    }

                    // Eigenschaften anpassen (z.B. frame.BackgroundColor3 = Color3.fromRGB(255,0,0))
                    Object.keys(instances).forEach(varName => {
                        let el = instances[varName];

                        // .BackgroundColor3
                        let colorMatch = line.match(new RegExp(`${varName}\\.BackgroundColor3\\s*=\\s*Color3\\.fromRGB\\(\\s*(\\d+)\\s*,\\s*(\\d+)\\s*,\\s*(\\d+)\\s*\\)`));
                        if (colorMatch) {
                            el.style.backgroundColor = `rgb(${colorMatch[1]}, ${colorMatch[2]}, ${colorMatch[3]})`;
                        }

                        // .Text
                        let textMatch = line.match(new RegExp(`${varName}\\.Text\\s*=\\s*"([^"]+)"`));
                        if (textMatch) {
                            el.innerText = textMatch[1];
                        }

                        // .Size (UDim2.new(0, x, 0, y))
                        let sizeMatch = line.match(new RegExp(`${varName}\\.Size\\s*=\\s*UDim2\\.new\\(\\s*\\d+\\s*,\\s*(\\d+)\\s*,\\s*\\d+\\s*,\\s*(\\d+)\\s*\\)`));
                        if (sizeMatch) {
                            el.style.width = sizeMatch[1] + 'px';
                            el.style.height = sizeMatch[2] + 'px';
                        }
                    });
                });

                // Konsole ausgeben
                if (consoleLogs.length > 0) {
                    outputBox.innerHTML = `<span class="success">${consoleLogs.join('<br>')}</span>`;
                } else {
                    outputBox.innerHTML = "<span class='system'>[System] Skript ohne Fehler ausgeführt, aber keine Ausgabe.</span>";
                }

                // Level-Check
                let currentLesson = lessons[currentLevel];
                if (currentLesson && currentLesson.check(code, outputBox.innerText, viewport.innerHTML)) {
                    
                    // Avatar freut sich (hüpft)
                    avatar.style.animation = 'none';
                    setTimeout(() => {
                        avatar.style.animation = 'jump 0.5s ease-in-out 2';
                    }, 10);

                    // Nächstes Level
                    setTimeout(() => {
                        currentLevel++;
                        if (lessons[currentLevel]) {
                            bubble.innerHTML = "<span style='color:#a6e3a1; font-weight:bold;'>Richtig! 🌟</span><br>" + lessons[currentLevel].text;
                        }
                        avatar.style.animation = 'float 3s ease-in-out infinite';
                    }, 1200);
                }

            } catch (e) {
                outputBox.innerHTML = `<span class="error">Syntax-Fehler! Überprüfe deinen Code.<br>Tipp: Achte auf Klammern () und Anführungszeichen "".</span>`;
            }
        }
    </script>
</body>
</html>
