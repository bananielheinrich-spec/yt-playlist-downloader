<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiTube - Lightweight Player</title>
    <style>
        body { 
            background-color: #121212; /* Dunkler Hintergrund, strengt den Pi weniger an */
            color: #ffffff; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        input { 
            flex-grow: 1;
            max-width: 500px;
            padding: 12px; 
            background: #2a2a2a; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 4px;
            font-size: 16px;
        }
        button { 
            padding: 12px 24px; 
            background: #cc0000; 
            color: white; 
            border: none; 
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:hover { background: #ff0000; }
        
        /* Sorgt für das richtige 16:9 Format des Videos */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; 
            background: #000;
        }
        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PiTube für Raspberry Pi 3</h1>
        
        <div class="controls">
            <input type="text" id="videoInput" placeholder="YouTube-Link hier einfügen (z.B. https://youtu.be/...)">
            <button onclick="loadVideo()">Starten</button>
        </div>
        
        <div class="video-container">
            <div id="player"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
