<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Externer Sprachchat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            padding: 50px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background-color: #45a049; }
        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin: 10px;
        }
        #status { margin-top: 20px; font-weight: bold; color: #ff9800; }
    </style>
</head>
<body>

    <h2>Externer Sprachchat für Gaming</h2>
    <p>Tragt dieselbe Raum-ID ein, um miteinander zu sprechen.</p>

    <input type="text" id="roomIdInput" placeholder="Raum-ID eingeben (z.B. meine-lobby)">
    <br>
    <button id="connectBtn">Verbinden & Mikrofon starten</button>

    <div id="status">Nicht verbunden</div>
    <audio id="remoteAudio" autoplay></audio>

    <!-- PeerJS Bibliothek für die Verbindung -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const connectBtn = document.getElementById('connectBtn');
        const roomIdInput = document.getElementById('roomIdInput');
        const statusDiv = document.getElementById('status');
        const remoteAudio = document.getElementById('remoteAudio');

        let peer;
        let localStream;

        connectBtn.addEventListener('click', async () => {
            const roomId = roomIdInput.value.trim();
            if (!roomId) {
                alert("Bitte gib eine Raum-ID ein!");
                return;
            }

            statusDiv.innerText = "Frage Mikrofon-Zugriff an...";

            try {
                // Mikrofon im Browser aktivieren
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                statusDiv.innerText = "Mikrofon aktiv. Verbinde mit Netzwerk...";

                // Eindeutige ID für diesen Browser erstellen basierend auf dem Raum
                // (Wir nutzen hier einen einfachen PeerJS-Aufbau)
                peer = new Peer();

                peer.on('open', (id) => {
                    statusDiv.innerText = "Verbunden! Deine ID: " + id + ". Warte auf andere Spieler im Raum '" + roomId + "'...";
                    
                    // Hier könntest du die ID über einen kleinen Trick teilen, 
                    // oder ihr tauscht die Peer-IDs manuell im Chat aus.
                });

                // Anrufe von anderen Spielern empfangen
                peer.on('call', (call) => {
                    call.answer(localStream); // Eigenes Audio zurücksenden
                    call.on('stream', (remoteStream) => {
                        remoteAudio.srcObject = remoteStream;
                        statusDiv.innerText = "🔴 Im Sprachgespräch!";
                    });
                });

            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Fehler: Mikrofon-Zugriff verweigert.";
            }
        });
    </script>
</body>
</html>
