<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord-Style Sprachchat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #313338;
            color: #dbdee1;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #2b2d31;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 { color: #f2f3f5; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #949ba4; margin-bottom: 6px; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background-color: #1e1f22;
            border: none;
            border-radius: 4px;
            color: #dbdee1;
            box-sizing: border-box;
        }
        input:focus { outline: 1px solid #5865f2; }
        button {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            background-color: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #4752c4; }
        #call-screen { display: none; }
        .user-list {
            background-color: #1e1f22;
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
        }
        .user-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin-bottom: 5px;
            background-color: #2b2d31;
            border-radius: 4px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-right: 10px;
            font-size: 14px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-danger { background-color: #da373c; }
        .btn-danger:hover { background-color: #a1282c; }
    </style>
</head>
<body>

    <!-- LOBBY SCREEN -->
    <div class="container" id="lobby-screen">
        <h2>Sprachkanal beitreten</h2>
        
        <div class="input-group">
            <label>Dein Name</label>
            <input type="text" id="usernameInput" placeholder="z. B. 1Bananiel1616">
        </div>

        <div class="input-group">
            <label>Raum-Name</label>
            <input type="text" id="roomInput" placeholder="z. B. hangouthub">
        </div>

        <button id="joinBtn">Verbinden</button>
    </div>

    <!-- CALL SCREEN (Discord Style) -->
    <div class="container" id="call-screen">
        <h2 id="roomTitle">Kanal</h2>
        <label>Aktive Teilnehmer</label>
        
        <div class="user-list" id="userList">
            <!-- Teilnehmer werden hier angezeigt -->
        </div>

        <div class="controls">
            <button id="leaveBtn" class="btn-danger">Verlassen</button>
        </div>
    </div>

    <!-- Audio-Container für Sprachwiedergabe -->
    <div id="audio-container" style="display:none;"></div>

    <!-- PeerJS Bibliothek -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const lobbyScreen = document.getElementById('lobby-screen');
        const callScreen = document.getElementById('call-screen');
        const joinBtn = document.getElementById('joinBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const usernameInput = document.getElementById('usernameInput');
        const roomInput = document.getElementById('roomInput');
        const roomTitle = document.getElementById('roomTitle');
        const userList = document.getElementById('userList');
        const audioContainer = document.getElementById('audio-container');

        let peer;
        let localStream;
        let myName = "";
        let currentRoom = "";

        joinBtn.addEventListener('click', async () => {
            myName = usernameInput.value.trim();
            currentRoom = roomInput.value.trim().toLowerCase();

            if (!myName || !currentRoom) {
                alert("Bitte gib deinen Namen und einen Raum ein!");
                return;
            }

            try {
                // Mikrofon im Browser aktivieren
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

                // UI umschalten
                lobbyScreen.style.display = 'none';
                callScreen.style.display = 'block';
                roomTitle.innerText = "Kanal: " + currentRoom;

                // Eher eigene UI-Karte hinzufügen
                addUserToList(myName, "Du");

                // PeerJS starten mit einem Präfix für den Raum
                // (Damit sich Spieler im selben Raum finden, nutzen wir eine öffentliche PeerJS Cloud mit Raumnamen-ID)
                initPeerConnection();

            } catch (err) {
                console.error(err);
                alert("Mikrofon-Zugriff verweigert oder Fehler aufgetreten!");
            }
        });

        function initPeerConnection() {
            // Wir erstellen eine eindeutige Peer-ID basierend auf Raum und Namen
            const uniqueId = "roblox-vc-" + currentRoom + "-" + Math.random().toString(36).substring(2, 7);
            peer = new Peer(uniqueId);

            peer.on('open', (id) => {
                console.log("Verbunden mit Peer-ID: " + id);
                // Da PeerJS ohne zentrales Backend keine automatische Raumliste hat,
                // verbindet sich jeder neue Peer. (Für einen echten Server bräuchte man Node.js, 
                // aber im Browser teilt man sich kurz den Link/Raum).
            });

            // Wenn jemand anruft
            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    playRemoteAudio(remoteStream, call.peer);
                });
            });
        }

        function addUserToList(name, id) {
            if (document.getElementById('user-' + id)) return;
            
            const div = document.createElement('div');
            div.className = 'user-item';
            div.id = 'user-' + id;
            
            const initials = name.substring(0, 2).toUpperCase();
            
            div.innerHTML = `
                <div class="avatar">${initials}</div>
                <div><strong>${name}</strong></div>
            `;
            userList.appendChild(div);
        }

        function playRemoteAudio(stream, peerId) {
            if (document.getElementById('audio-' + peerId)) return;

            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.id = 'audio-' + peerId;
            audioContainer.appendChild(audio);

            // Simulierten Namen aus der Peer-ID extrahieren für die Liste
            addUserToList("Mitspieler", peerId);
        }

        leaveBtn.addEventListener('click', () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peer) {
                peer.destroy();
            }
            location.reload(); // Seite neu laden, um den Raum komplett zu verlassen
        });
    </script>
</body>
</html>
