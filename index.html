<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord-Style Sprachchat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #313338;
            color: #dbdee1;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #2b2d31;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h2 { color: #f2f3f5; margin-top: 0; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #949ba4; margin-bottom: 6px; text-transform: uppercase; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background-color: #1e1f22;
            border: none;
            border-radius: 4px;
            color: #dbdee1;
            box-sizing: border-box;
        }
        input:focus { outline: 1px solid #5865f2; }
        
        .avatar-upload {
            text-align: center;
            margin-bottom: 15px;
        }
        .avatar-preview {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #5865f2;
            margin: 0 auto 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 20px;
            overflow: hidden;
            border: 2px solid #4752c4;
            cursor: pointer;
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        input[type="file"] { display: none; }

        button {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            background-color: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #4752c4; }
        
        #call-screen { display: none; }
        .user-list {
            background-color: #1e1f22;
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 5px;
            background-color: #2b2d31;
            border-radius: 4px;
        }
        .user-info {
            display: flex;
            align-items: center;
        }
        .avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-right: 10px;
            font-size: 12px;
            overflow: hidden;
        }
        .avatar-small img { width: 100%; height: 100%; object-fit: cover; }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-secondary { background-color: #4e5058; }
        .btn-secondary:hover { background-color: #6d6f78; }
        .btn-danger { background-color: #da373c; }
        .btn-danger:hover { background-color: #a1282c; }
        .mute-btn {
            background: none;
            border: none;
            color: #949ba4;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            width: auto;
            margin: 0;
        }
        .mute-btn:hover { color: white; background: none; }
        #error-msg { color: #da373c; font-size: 13px; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <!-- LOBBY SCREEN -->
    <div class="container" id="lobby-screen">
        <h2>Sprachkanal</h2>
        
        <div class="avatar-upload">
            <label for="avatarInput">
                <div class="avatar-preview" id="avatarPreview">JD</div>
            </label>
            <input type="file" id="avatarInput" accept="image/*">
            <span style="font-size: 11px; color: #949ba4;">Klicken, um Profilbild zu wählen</span>
        </div>

        <div class="input-group">
            <label>Dein Name</label>
            <input type="text" id="usernameInput" placeholder="z. B. 1Bananiel1616">
        </div>

        <button id="joinBtn">Beitreten</button>
        <div id="error-msg">Dieser Name ist bereits vergeben!</div>
    </div>

    <!-- CALL SCREEN -->
    <div class="container" id="call-screen">
        <h2>Haupt-Kanal</h2>
        <label>Teilnehmer</label>
        
        <div class="user-list" id="userList"></div>

        <div class="controls">
            <button id="muteSelfBtn" class="btn-secondary">Mikro aus</button>
            <button id="leaveBtn" class="btn-danger">Verlassen</button>
        </div>
    </div>

    <div id="audio-container" style="display:none;"></div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const lobbyScreen = document.getElementById('lobby-screen');
        const callScreen = document.getElementById('call-screen');
        const joinBtn = document.getElementById('joinBtn');
        const leaveBtn = document.getElementById('leaveBtn');
        const muteSelfBtn = document.getElementById('muteSelfBtn');
        const usernameInput = document.getElementById('usernameInput');
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const userList = document.getElementById('userList');
        const audioContainer = document.getElementById('audio-container');
        const errorMsg = document.getElementById('error-msg');

        let peer;
        let localStream;
        let myName = "";
        let myAvatarUrl = "";
        let isMuted = false;
        
        // Liste aller bekannten Namen im Raum
        const activeNames = new Set();

        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    myAvatarUrl = event.target.result;
                    avatarPreview.innerHTML = `<img src="${myAvatarUrl}">`;
                }
                reader.readAsDataURL(file);
            }
        });

        joinBtn.addEventListener('click', async () => {
            myName = usernameInput.value.trim();
            if (!myName) {
                errorMsg.innerText = "Bitte gib einen Namen ein!";
                errorMsg.style.display = "block";
                return;
            }

            // Prüfen, ob der Name lokal schon existiert
            if (activeNames.has(myName.toLowerCase())) {
                errorMsg.innerText = "Dieser Name ist bereits vergeben!";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = "none";

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

                lobbyScreen.style.display = 'none';
                callScreen.style.display = 'block';

                activeNames.add(myName.toLowerCase());
                addUserToList(myName, myAvatarUrl, "local", true);
                initPeerConnection();

            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Mikrofon-Zugriff verweigert!";
                errorMsg.style.display = "block";
            }
        });

        function initPeerConnection() {
            peer = new Peer();

            peer.on('open', (id) => {
                console.log("Eigene ID: " + id);
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    playRemoteAudio(remoteStream, call.peer);
                });
            });
        }

        function addUserToList(name, avatarUrl, id, isMe = false) {
            if (document.getElementById('user-' + id)) return;
            
            activeNames.add(name.toLowerCase());

            const div = document.createElement('div');
            div.className = 'user-item';
            div.id = 'user-' + id;
            
            const avatarContent = avatarUrl ? `<img src="${avatarUrl}">` : name.substring(0, 2).toUpperCase();
            
            let muteButtonHtml = "";
            if (!isMe) {
                muteButtonHtml = `<button class="mute-btn" onclick="toggleRemoteMute('${id}')" id="mute-icon-${id}">🔊</button>`;
            }

            div.innerHTML = `
                <div class="user-info">
                    <div class="avatar-small">${avatarContent}</div>
                    <div><strong>${name}</strong> ${isMe ? '(Du)' : ''}</div>
                </div>
                ${muteButtonHtml}
            `;
            userList.appendChild(div);
        }

        function playRemoteAudio(stream, peerId) {
            if (document.getElementById('audio-' + peerId)) return;

            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.id = 'audio-' + peerId;
            audioContainer.appendChild(audio);

            // Platzhalter-Name, falls noch kein Namens-Datenaustausch stattgefunden hat
            addUserToList("Mitspieler", "", peerId, false);
        }

        muteSelfBtn.addEventListener('click', () => {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            
            if (isMuted) {
                muteSelfBtn.innerText = "Mikro an";
                muteSelfBtn.style.backgroundColor = "#da373c";
            } else {
                muteSelfBtn.innerText = "Mikro aus";
                muteSelfBtn.style.backgroundColor = "#4e5058";
            }
        });

        window.toggleRemoteMute = function(peerId) {
            const audioElem = document.getElementById('audio-' + peerId);
            const muteIcon = document.getElementById('mute-icon-' + peerId);
            
            if (audioElem) {
                audioElem.muted = !audioElem.muted;
                if (audioElem.muted) {
                    muteIcon.innerText = "🔇";
                } else {
                    muteIcon.innerText = "🔊";
                }
            }
        }

        leaveBtn.addEventListener('click', () => {
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (peer) peer.destroy();
            location.reload();
        });
    </script>
</body>
</html>
