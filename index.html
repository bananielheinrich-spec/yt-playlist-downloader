<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangout Hub</title>
    <!-- PeerJS für WebRTC Verbindungen -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Discord-Style Theme Variablen */
        :root {
            --bg-color: #313338;
            --container-bg: #2b2d31;
            --container-hover: #35373c;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --error: #ed4245;
            --success: #23a559;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Lobby & Chat Container */
        .screen {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            display: none; /* Wird per JS umgeschaltet */
        }

        .screen.active {
            display: block;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            background-color: #1e1f22;
            border: none;
            border-radius: 4px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            outline: 2px solid var(--accent);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-leave {
            background-color: var(--error);
            margin-top: 20px;
        }
        
        .btn-leave:hover {
            background-color: #c93b3e;
        }

        .error-msg {
            color: var(--error);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* Voice Chat UI */
        #chat-screen {
            max-width: 800px;
            width: 90%;
            height: 80vh;
            display: none;
            flex-direction: column;
        }

        #chat-screen.active {
            display: flex;
        }

        .participants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
        }

        .participant-card {
            background-color: var(--bg-color);
            border-radius: var(--border-radius);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--container-hover);
            margin-bottom: 10px;
            object-fit: cover;
            border: 3px solid transparent;
        }

        .participant-name {
            font-weight: bold;
            font-size: 14px;
            word-break: break-all;
            text-align: center;
        }

        .mute-toggle {
            margin-top: 10px;
            background-color: var(--container-hover);
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--bg-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="screen active">
        <h1>Hangout Hub</h1>
        
        <div class="input-group">
            <label for="roblox-name">Roblox Benutzername</label>
            <input type="text" id="roblox-name" placeholder="z. B. 1Bananiel1616" autocomplete="off">
        </div>

        <!-- Der Raum-Input wurde entfernt. Es gibt nur noch den Beitreten/Weiter-Button -->
        <button id="join-btn">Weiter</button>
        <div id="error-text" class="error-msg"></div>
    </div>

    <!-- VOICE CHAT SCREEN -->
    <div id="chat-screen" class="screen">
        <h1 id="room-title">Hangout Hub - Global</h1>
        
        <div class="participants-grid" id="participants-list">
            <!-- Teilnehmer werden hier dynamisch per JS generiert -->
        </div>

        <div class="controls">
            <button id="toggle-mic-btn">Mikrofon ausschalten</button>
            <button id="leave-btn" class="btn-leave">Verlassen</button>
        </div>
    </div>

    <script>
        // --- Globale Variablen ---
        let localStream = null;
        let peer = null;
        let myIndex = 0;
        
        // Da es nur noch einen Raum gibt, habe ich das Limit etwas erhöht.
        // Beachte: P2P-Netzwerke ohne Server werden ab ca. 30-40 Leuten oft sehr rechenintensiv für den Browser.
        const MAX_PEERS = 40; 
        
        // Der fest einprogrammierte, einzige Raumname
        const GLOBAL_ROOM_NAME = 'global-hub';
        
        let baseRoomId = '';
        let myInfo = { name: '', avatar: '' };
        let peers = {}; // Speichert aktive Verbindungen
        let meshInterval = null;

        // --- DOM Elemente ---
        const lobbyScreen = document.getElementById('lobby-screen');
        const chatScreen = document.getElementById('chat-screen');
        const joinBtn = document.getElementById('join-btn');
        const errorText = document.getElementById('error-text');
        const participantsList = document.getElementById('participants-list');
        const toggleMicBtn = document.getElementById('toggleMic-btn') || document.getElementById('toggle-mic-btn');
        const leaveBtn = document.getElementById('leave-btn');

        // --- 1. Roblox Verifizierung ---
        async function verifyRobloxUser(username) {
            try {
                // Wir nutzen einen CORS-Proxy, um die Roblox-API im Browser abzufragen
                const proxy = 'https://corsproxy.io/?';
                const searchUrl = `https://users.roblox.com/v1/users/search?keyword=${encodeURIComponent(username)}&limit=10`;
                
                const res = await fetch(proxy + encodeURIComponent(searchUrl));
                const data = await res.json();
                
                // Exakten Namen suchen (Case-Insensitive)
                const user = data.data.find(u => u.name.toLowerCase() === username.toLowerCase());
                
                if (!user) return null; // Account existiert nicht

                // Headshot laden
                const avatarUrl = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${user.id}&size=150x150&format=Png&isCircular=true`;
                const avatarRes = await fetch(proxy + encodeURIComponent(avatarUrl));
                const avatarData = await avatarRes.json();
                
                return {
                    name: user.name,
                    avatar: avatarData.data[0].imageUrl
                };
            } catch (err) {
                console.error("Roblox API Fehler:", err);
                return null;
            }
        }

        // --- 2. Beitreten Logik ---
        joinBtn.addEventListener('click', async () => {
            const username = document.getElementById('roblox-name').value.trim();

            if (!username) {
                showError("Bitte gib deinen Roblox-Namen ein.");
                return;
            }

            joinBtn.disabled = true;
            joinBtn.innerText = "Verifiziere Account...";
            errorText.style.display = 'none';

            // Roblox Check
            const verifiedData = await verifyRobloxUser(username);
            
            if (!verifiedData) {
                showError("Dieser Roblox-Account existiert nicht.");
                joinBtn.disabled = false;
                joinBtn.innerText = "Weiter";
                return;
            }

            myInfo = verifiedData;
            
            try {
                joinBtn.innerText = "Greife auf Mikrofon zu...";
                // Mikrofon anfordern
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                // UI Wechseln
                lobbyScreen.classList.remove('active');
                chatScreen.classList.add('active');

                // PeerJS initialisieren für den globalen Raum (Start bei Index 0)
                initPeerMesh(GLOBAL_ROOM_NAME, 0);

            } catch (err) {
                showError("Mikrofon-Zugriff verweigert!");
                joinBtn.disabled = false;
                joinBtn.innerText = "Weiter";
            }
        });

        function showError(msg) {
            errorText.innerText = msg;
            errorText.style.display = 'block';
        }

        // --- 3. PeerJS Mesh-Netzwerk Logik ---
        function initPeerMesh(room, index) {
            if (index > MAX_PEERS) {
                alert("Der Hangout Hub ist momentan komplett voll (Maximal " + MAX_PEERS + " Spieler).");
                location.reload();
                return;
            }

            baseRoomId = `hghub-${room}`;
            const myId = `${baseRoomId}-${index}`;

            peer = new Peer(myId);

            peer.on('open', (id) => {
                myIndex = index;
                console.log("Verbunden als:", id);
                
                addParticipantToUI(myInfo.name, myInfo.avatar, id, true);
                startMeshDiscovery();
            });

            peer.on('error', (err) => {
                // ID schon belegt -> Wir probieren den nächsten "Stuhl" im Raum
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    initPeerMesh(room, index + 1);
                } else {
                    console.error("PeerJS Fehler:", err);
                }
            });

            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'hello') {
                        peers[conn.peer] = { ...peers[conn.peer], info: data.info, conn };
                        addParticipantToUI(data.info.name, data.info.avatar, conn.peer, false);
                        conn.send({ type: 'hello-back', info: myInfo });
                    } 
                    else if (data.type === 'hello-back') {
                        peers[conn.peer] = { ...peers[conn.peer], info: data.info, conn };
                        addParticipantToUI(data.info.name, data.info.avatar, conn.peer, false);
                        
                        const remoteIndex = parseInt(conn.peer.split('-').pop());
                        if (myIndex < remoteIndex) {
                            initiateCall(conn.peer);
                        }
                    }
                });

                conn.on('close', () => removePeer(conn.peer));
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                handleAudioStream(call);
            });
        }

        function startMeshDiscovery() {
            meshInterval = setInterval(() => {
                for (let i = 0; i <= MAX_PEERS; i++) {
                    if (i === myIndex) continue;
                    
                    const targetId = `${baseRoomId}-${i}`;
                    if (!peers[targetId]) {
                        connectToPeer(targetId, i);
                    }
                }
            }, 3000);
        }

        function connectToPeer(targetId, targetIndex) {
            peers[targetId] = { pending: true };

            const conn = peer.connect(targetId);
            
            conn.on('open', () => {
                peers[targetId] = { conn };
                conn.send({ type: 'hello', info: myInfo });
            });

            conn.on('close', () => removePeer(targetId));
            conn.on('error', () => removePeer(targetId));
        }

        function initiateCall(targetId) {
            const call = peer.call(targetId, localStream);
            handleAudioStream(call);
        }

        function handleAudioStream(call) {
            call.on('stream', (remoteStream) => {
                if (!document.getElementById(`audio-${call.peer}`)) {
                    const audio = document.createElement('audio');
                    audio.id = `audio-${call.peer}`;
                    audio.srcObject = remoteStream;
                    audio.autoplay = true;
                    document.body.appendChild(audio);
                }
            });

            call.on('close', () => removePeer(call.peer));
            call.on('error', () => removePeer(call.peer));
        }

        function removePeer(peerId) {
            if (peers[peerId]) {
                delete peers[peerId];
            }
            const card = document.getElementById(`card-${peerId}`);
            if (card) card.remove();
            
            const audio = document.getElementById(`audio-${peerId}`);
            if (audio) audio.remove();
        }

        // --- 4. UI Funktionen ---
        function addParticipantToUI(name, avatarUrl, peerId, isMe) {
            if (document.getElementById(`card-${peerId}`)) return;

            const card = document.createElement('div');
            card.className = 'participant-card';
            card.id = `card-${peerId}`;

            const img = document.createElement('img');
            img.className = 'avatar';
            img.src = avatarUrl;
            img.alt = name;

            const nameEl = document.createElement('div');
            nameEl.className = 'participant-name';
            nameEl.innerText = name + (isMe ? " (Du)" : "");

            card.appendChild(img);
            card.appendChild(nameEl);

            if (!isMe) {
                const muteBtn = document.createElement('button');
                muteBtn.className = 'mute-toggle';
                muteBtn.innerText = 'Stummschalten';
                
                let isMuted = false;
                muteBtn.onclick = () => {
                    const audioEl = document.getElementById(`audio-${peerId}`);
                    if (audioEl) {
                        isMuted = !isMuted;
                        audioEl.muted = isMuted;
                        muteBtn.innerText = isMuted ? 'Entstummen' : 'Stummschalten';
                        muteBtn.style.backgroundColor = isMuted ? 'var(--error)' : 'var(--container-hover)';
                    }
                };
                card.appendChild(muteBtn);
            }

            participantsList.appendChild(card);
        }

        let micEnabled = true;
        toggleMicBtn.addEventListener('click', () => {
            if (localStream) {
                micEnabled = !micEnabled;
                localStream.getAudioTracks()[0].enabled = micEnabled;
                toggleMicBtn.innerText = micEnabled ? "Mikrofon ausschalten" : "Mikrofon anschalten";
                toggleMicBtn.style.backgroundColor = micEnabled ? "var(--accent)" : "var(--error)";
            }
        });

        leaveBtn.addEventListener('click', () => {
            if (peer) peer.destroy();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (meshInterval) clearInterval(meshInterval);
            location.reload(); 
        });

    </script>
</body>
</html>
