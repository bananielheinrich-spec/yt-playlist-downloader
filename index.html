<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Playlist Downloader Pro</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --container-bg: #1f1f1f;
            --accent-color: #ff0000;
            --accent-hover: #cc0000;
            --text-color: #f1f1f1;
            --text-muted: #aaaaaa;
            --card-bg: #282828;
            --button-mp3: #007bff;
            --button-mp3-hover: #0056b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent-color);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #121212;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-main {
            background-color: var(--accent-color);
        }

        .btn-main:hover {
            background-color: var(--accent-hover);
        }

        .status-message {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .playlist-info {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            display: none;
        }

        .playlist-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .video-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .video-list::-webkit-scrollbar {
            width: 6px;
        }
        .video-list::-webkit-scrollbar-track {
            background: #121212;
            border-radius: 4px;
        }
        .video-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .video-item {
            display: flex;
            gap: 15px;
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 8px;
            align-items: center;
        }

        .video-thumbnail {
            width: 120px;
            height: 68px;
            object-fit: cover;
            border-radius: 6px;
            background-color: #000;
            flex-shrink: 0;
        }

        .video-details {
            flex: 1;
            min-width: 0;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-download {
            padding: 8px 14px;
            font-size: 0.85rem;
        }

        .btn-mp4 {
            background-color: #333;
        }
        .btn-mp4:hover {
            background-color: #444;
        }

        .btn-mp3 {
            background-color: var(--button-mp3);
        }
        .btn-mp3:hover {
            background-color: var(--button-mp3-hover);
        }

        .btn-loading {
            background-color: #555 !important;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            .video-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .video-thumbnail {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }
            .actions {
                width: 100%;
                margin-top: 10px;
            }
            .btn-download {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span>YouTube</span> Playlist Downloader</h1>
        
        <div class="input-group">
            <input type="text" id="playlistUrl" placeholder="YouTube Playlist URL einfügen..." autocomplete="off">
            <button class="btn-main" id="loadBtn" onclick="loadPlaylist()">Playlist laden</button>
        </div>

        <div class="status-message" id="statusMsg">Gib eine Playlist-URL ein und klicke auf "Playlist laden". Hinweis: Die Playlist muss öffentlich oder nicht gelistet sein.</div>

        <div class="playlist-info" id="playlistInfo">
            <div class="playlist-title" id="playlistTitleDisplay">Playlist Videos</div>
        </div>

        <div class="video-list" id="videoList"></div>
    </div>

    <script>
        function extractPlaylistId(url) {
            const regExp = /[&?]list=([^#\&\?]+)/;
            const match = url.match(regExp);
            if (match && match[1]) return match[1];
            if (url.startsWith("PL") && url.length >= 18) return url;
            return null;
        }

        async function loadPlaylist() {
            const urlInput = document.getElementById('playlistUrl').value.trim();
            const statusMsg = document.getElementById('statusMsg');
            const videoListContainer = document.getElementById('videoList');
            const playlistInfo = document.getElementById('playlistInfo');
            const loadBtn = document.getElementById('loadBtn');

            const playlistId = extractPlaylistId(urlInput);

            if (!playlistId) {
                statusMsg.textContent = "Ungültige Playlist-URL. Bitte stelle sicher, dass die URL ein '?list=...' enthält.";
                statusMsg.style.color = "#ff4444";
                return;
            }

            statusMsg.textContent = "Playlist-Daten werden über alternative API geladen... Bitte kurz warten.";
            statusMsg.style.color = "#aaaaaa";
            videoListContainer.innerHTML = "";
            playlistInfo.style.display = "none";
            loadBtn.disabled = true;
            loadBtn.textContent = "Lädt...";

            // Methode: Nutzt eine direkte, freie und CORS-offene API-Instanz zum Parsen von YT-Playlists
            try {
                const response = await fetch(`https://api.v03.t-projects.xyz/api/yt/playlist?id=${playlistId}`);
                
                if (!response.ok) {
                    throw new Error("Die Playlist-API meldet einen Fehler oder ist überlastet.");
                }

                const data = await response.json();

                if (!data.videos || data.videos.length === 0) {
                    throw new Error("Keine Videos in dieser Playlist gefunden. Ist die Playlist eventuell privat?");
                }

                document.getElementById('playlistTitleDisplay').textContent = `Playlist (${data.videos.length} Videos)`;
                playlistInfo.style.display = "block";
                statusMsg.textContent = "Playlist erfolgreich geladen! Wähle dein Format zum Herunterladen.";
                statusMsg.style.color = "#44ff44";

                data.videos.forEach(video => {
                    const title = video.title || "Unbekannter Titel";
                    // Nutzt das standardisierte YouTube-Vorschaubild-Format
                    const thumbnail = `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;
                    const videoUrl = `https://www.youtube.com/watch?v=${video.id}`;

                    createVideoRow(title, thumbnail, videoUrl);
                });

            } catch (error) {
                console.error(error);
                statusMsg.textContent = `Fehler beim Laden: ${error.message}. Vergewissere dich, dass die Playlist öffentlich ist.`;
                statusMsg.style.color = "#ff4444";
            } finally {
                loadBtn.disabled = false;
                loadBtn.textContent = "Playlist laden";
            }
        }

        function createVideoRow(title, thumbnailUrl, videoUrl) {
            const container = document.getElementById('videoList');
            const item = document.createElement('div');
            item.className = 'video-item';

            item.innerHTML = `
                <img class="video-thumbnail" src="${thumbnailUrl}" alt="Thumbnail" onerror="this.src='https://via.placeholder.com/120x68?text=Kein+Bild'">
                <div class="video-details">
                    <div class="video-title" title="${title}">${title}</div>
                    <div class="actions">
                        <button class="btn-download btn-mp4" onclick="triggerDownload(this, '${videoUrl}', 'mp4')">MP4 (Video)</button>
                        <button class="btn-download btn-mp3" onclick="triggerDownload(this, '${videoUrl}', 'mp3')">MP3 (Audio)</button>
                    </div>
                </div>
            `;
            container.appendChild(item);
        }

        async function triggerDownload(buttonElement, videoUrl, format) {
            const originalText = buttonElement.textContent;
            buttonElement.disabled = true;
            buttonElement.classList.add('btn-loading');
            buttonElement.textContent = "Verarbeite...";

            try {
                const requestBody = {
                    url: videoUrl,
                    videoQuality: "720",
                    filenamePattern: "basic"
                };

                if (format === 'mp3') {
                    requestBody.downloadMode = "audio";
                    requestBody.audioFormat = "mp3";
                }

                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const result = await response.json();

                if (result.status === 'stream' || result.status === 'redirect') {
                    window.open(result.url, '_blank');
                    buttonElement.textContent = "Fertig!";
                    setTimeout(() => {
                        buttonElement.textContent = originalText;
                        buttonElement.disabled = false;
                        buttonElement.classList.remove('btn-loading');
                    }, 3000);
                } else if (result.status === 'error') {
                    throw new Error(result.text || "Die Download-API hat temporäre Probleme.");
                } else {
                    throw new Error("Unerwartete Antwort vom Server.");
                }

            } catch (error) {
                console.error(error);
                alert(`Download-Fehler: ${error.message}\nHinweis: Manche Musikvideos sind API-seitig geschützt. Versuche es ggf. noch einmal.`);
                buttonElement.textContent = "Fehler";
                buttonElement.style.backgroundColor = "#ff4444";
                setTimeout(() => {
                    buttonElement.textContent = originalText;
                    buttonElement.disabled = false;
                    buttonElement.classList.remove('btn-loading');
                    buttonElement.style.backgroundColor = "";
                }, 4000);
            }
        }
    </script>
</body>
</html>
