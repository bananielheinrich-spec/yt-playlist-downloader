<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hangout Hub - Voice Chat</title>
    
    <!-- Fix für den 404 Favicon Fehler -->
    <link rel="icon" href="https://fav.farm/🎙️" />
    
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome für Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PeerJS für WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- LOBBY SCREEN -->
        <div id="lobby-screen" class="screen active">
            <div class="card">
                <h1>Hangout Hub</h1>
                <p class="subtitle">Verbinde deinen Roblox-Account</p>
                
                <div id="saved-user-section" class="hidden">
                    <img id="saved-avatar" src="" alt="Avatar">
                    <h2 id="saved-username">Nutzername</h2>
                    <button id="btn-quick-join" class="btn-primary">Raum beitreten</button>
                    <button id="btn-logout" class="btn-secondary">Anderen Account nutzen</button>
                </div>

                <div id="login-section">
                    <div class="input-group">
                        <label for="roblox-username">Roblox Nutzername</label>
                        <input type="text" id="roblox-username" placeholder="Dein Name...">
                    </div>
                    
                    <div class="verification-box">
                        <p>1. Füge diesen Code in deine Roblox-Bio ein:</p>
                        <div class="code-display" id="verify-code">HUB-XXXX</div>
                        <p>2. Warte kurz und klicke auf Verifizieren.</p>
                    </div>

                    <button id="btn-verify" class="btn-primary">Verifizieren & Beitreten</button>
                    <p id="auth-status" class="status-message"></p>
                </div>
            </div>
        </div>

        <!-- CHAT SCREEN -->
        <div id="chat-screen" class="screen hidden">
            <header class="chat-header">
                <h2><i class="fa-solid fa-tower-broadcast"></i> Hangout Hub - Voice</h2>
                <span id="connection-status" class="badge connecting">Verbinde...</span>
            </header>

            <div id="peers-grid" class="grid-container">
                <!-- Eigene Karte wird per JS generiert -->
            </div>

            <div class="control-bar">
                <button id="btn-mute-self" class="control-btn active">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button id="btn-leave" class="control-btn danger">
                    <i class="fa-solid fa-phone-slash"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
