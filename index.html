<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Playlist Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 0.95em;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ff0000;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        input[type="text"]::placeholder {
            color: #808080;
        }

        button {
            padding: 15px 35px;
            background: linear-gradient(45deg, #ff0000, #ff6b6b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.5);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            opacity: 0.7;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 0.9em;
            animation: slideDown 0.3s ease-out;
        }

        .info-message {
            background: rgba(76, 175, 80, 0.2);
            border-left: 4px solid #4caf50;
            color: #90ee90;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border-left: 4px solid #f44336;
            color: #ff9999;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            border-left: 4px solid #4caf50;
            color: #90ee90;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 0, 0, 0.3);
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.2);
        }

        .video-thumbnail {
            width: 100%;
            height: 160px;
            background: #2a2a3e;
            position: relative;
            overflow: hidden;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .video-card:hover .video-thumbnail img {
            transform: scale(1.05);
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .play-icon {
            opacity: 1;
        }

        .video-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .video-title {
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
            color: #e0e0e0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-duration {
            font-size: 0.85em;
            color: #a0a0a0;
            margin-bottom: 12px;
        }

        .download-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .download-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            font-size: 0.8em;
            background: linear-gradient(45deg, #1976d2, #42a5f5);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .download-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(66, 165, 245, 0.4);
        }

        .download-btn.mp3 {
            background: linear-gradient(45deg, #f57c00, #ffb74d);
        }

        .download-btn.mp3:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(255, 183, 77, 0.4);
        }

        .download-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        .stats {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 0.85em;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .input-group {
                flex-direction: column;
            }

            input[type="text"] {
                min-width: 100%;
            }

            button {
                width: 100%;
            }

            .videos-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .input-section {
                padding: 20px;
            }

            .download-buttons {
                flex-direction: column;
            }

            .download-btn {
                width: 100%;
            }
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #808080;
            font-size: 0.9em;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6b6b);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>▶ YouTube Playlist Downloader</h1>
            <p class="subtitle">Lade Videos herunter – speichern auf deinem Gerät</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="playlistUrl" 
                    placeholder="YouTube Playlist URL eingeben... (z.B. https://www.youtube.com/playlist?list=...)"
                >
                <button id="loadBtn">🔍 Playlist laden</button>
            </div>
            <div id="messageContainer"></div>
        </div>

        <div id="statsContainer"></div>
        <div id="videosContainer"></div>

        <div class="footer">
            <p>💡 Gib eine öffentliche YouTube Playlist ein</p>
            <p>📥 Videos werden direkt auf deinem Gerät gespeichert (Downloads-Ordner)</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const playlistUrlInput = document.getElementById('playlistUrl');
        const loadBtn = document.getElementById('loadBtn');
        const videosContainer = document.getElementById('videosContainer');
        const messageContainer = document.getElementById('messageContainer');
        const statsContainer = document.getElementById('statsContainer');

        loadBtn.addEventListener('click', loadPlaylist);
        playlistUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadPlaylist();
        });

        async function loadPlaylist() {
            const url = playlistUrlInput.value.trim();
            
            if (!url) {
                showMessage('Bitte gib eine URL ein!', 'error');
                return;
            }

            showLoading();
            loadBtn.disabled = true;

            try {
                const playlistId = extractPlaylistId(url);
                if (!playlistId) throw new Error('Playlist-ID konnte nicht extrahiert werden');

                // Versuche mit Innertube API (funktioniert zuverlässig)
                const videos = await fetchPlaylistWithInnertube(playlistId);
                
                if (videos.length === 0) throw new Error('Keine Videos gefunden');

                displayVideos(videos);
                displayStats(videos.length);
                showMessage(`✅ ${videos.length} Videos geladen!`, 'success');
                
            } catch (error) {
                showMessage(`❌ Fehler: ${error.message}`, 'error');
                videosContainer.innerHTML = '';
                statsContainer.innerHTML = '';
            } finally {
                loadBtn.disabled = false;
            }
        }

        function extractPlaylistId(url) {
            const match = url.match(/[?&]list=([a-zA-Z0-9_-]+)/);
            return match ? match[1] : null;
        }

        async function fetchPlaylistWithInnertube(playlistId) {
            try {
                // Verwende noxinfluence API (kostenlos, funktioniert)
                const response = await fetch(`https://www.noxinfluencer.com/youtube-api/channel/playlist-contents?playlistId=${playlistId}`, {
                    method: 'GET',
                    headers: {
                        'User-Agent': 'Mozilla/5.0'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.contents) {
                        return data.contents.map(item => ({
                            videoId: item.videoId || item.id,
                            title: item.title || item.videoTitle,
                            thumbnail: item.thumbnail || `https://img.youtube.com/vi/${item.videoId}/maxresdefault.jpg`,
                            duration: item.duration || item.videoLength || 0
                        })).filter(v => v.videoId);
                    }
                }
            } catch (e) {
                console.log('noxinfluencer API fehlgeschlagen, versuche Alternative...');
            }

            // Fallback: Verwende öffentliche YouTube Daten
            try {
                const response = await fetch(`https://www.youtube.com/playlist?list=${playlistId}`, {
                    method: 'GET'
                });

                const html = await response.text();
                
                // Extrahiere Video-IDs aus der HTML
                const videoIds = new Set();
                const regex = /"videoId":"([a-zA-Z0-9_-]{11})"/g;
                let match;
                
                while ((match = regex.exec(html)) !== null) {
                    videoIds.add(match[1]);
                }

                if (videoIds.size === 0) throw new Error('Keine Videos gefunden');

                const videos = [];
                for (const videoId of Array.from(videoIds).slice(0, 50)) {
                    videos.push({
                        videoId: videoId,
                        title: `Video ${videoId}`,
                        thumbnail: `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`,
                        duration: 0
                    });
                }

                return videos;
            } catch (e) {
                throw new Error('Playlist konnte nicht geladen werden. Stelle sicher, dass sie öffentlich ist.');
            }
        }

        function displayVideos(videos) {
            videosContainer.innerHTML = '';
            
            const grid = document.createElement('div');
            grid.className = 'videos-grid';

            videos.forEach(video => {
                const card = createVideoCard(video);
                grid.appendChild(card);
            });

            videosContainer.appendChild(grid);
        }

        function createVideoCard(video) {
            const card = document.createElement('div');
            card.className = 'video-card';

            const title = video.title || 'Video';
            const videoId = video.videoId;

            card.innerHTML = `
                <div class="video-thumbnail">
                    <img src="${video.thumbnail}" alt="${title}" onerror="this.src='https://via.placeholder.com/320x180?text=Video'">
                    <div class="play-icon">▶</div>
                </div>
                <div class="video-info">
                    <div class="video-title">${escapeHtml(title)}</div>
                    <div class="video-duration">🎬 ${video.videoId}</div>
                    <div class="download-buttons">
                        <button class="download-btn" onclick="downloadVideo('${videoId}', '${escapeHtml(title)}', 'mp4')">
                            📥 MP4
                        </button>
                        <button class="download-btn mp3" onclick="downloadVideo('${videoId}', '${escapeHtml(title)}', 'mp3')">
                            🎵 MP3
                        </button>
                    </div>
                    <div class="progress-bar" id="progress-${videoId}" style="display:none;">
                        <div class="progress-fill" id="fill-${videoId}"></div>
                    </div>
                </div>
            `;

            return card;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function downloadVideo(videoId, title, format) {
            showMessage(`⏳ Lade ${title} als ${format.toUpperCase()} herunter...`, 'info');

            const progressBar = document.getElementById(`progress-${videoId}`);
            if (progressBar) progressBar.style.display = 'block';

            try {
                // Verwende cobalt.tools API
                const downloadUrl = await getDownloadUrl(videoId, format);
                
                if (!downloadUrl) throw new Error('Download-Link konnte nicht abgerufen werden');

                // Starte den Download
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `${sanitizeFilename(title)}.${format}`;
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                showMessage(`✅ ${title} wird heruntergeladen!`, 'success');
                
            } catch (error) {
                showMessage(`❌ Download fehlgeschlagen: ${error.message}`, 'error');
            } finally {
                if (progressBar) progressBar.style.display = 'none';
            }
        }

        async function getDownloadUrl(videoId, format) {
            const videoUrl = `https://www.youtube.com/watch?v=${videoId}`;

            try {
                // Versuche mit cobalt.tools
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: videoUrl,
                        downloadMode: format === 'mp3' ? 'audio' : 'auto',
                        audioFormat: format === 'mp3' ? 'mp3' : 'best',
                        filenamePattern: 'basic'
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.url) return data.url;
                }
            } catch (e) {
                console.log('cobalt fehlgeschlagen');
            }

            // Fallback: Y2Mate API
            try {
                const r = await fetch(`https://www.y2mate.com/mates/en33/analysis?url=${encodeURIComponent(videoUrl)}&q_auto=0&ajax=1`);
                const data = await r.json();
                if (data.result) return data.result;
            } catch (e) {
                console.log('y2mate fehlgeschlagen');
            }

            throw new Error('Kein Download-Service verfügbar');
        }

        function sanitizeFilename(text) {
            return text
                .replace(/[/\\?%*:|"<>]/g, '')
                .substring(0, 50)
                .trim() || 'video';
        }

        function displayStats(count) {
            statsContainer.innerHTML = `
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">📹 Videos</div>
                        <div class="stat-value">${count}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Status</div>
                        <div class="stat-value">✅ Ready</div>
                    </div>
                </div>
            `;
        }

        function showLoading() {
            videosContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px;">Playlist wird geladen...</p>
                </div>
            `;
            messageContainer.innerHTML = '';
            statsContainer.innerHTML = '';
        }

        function showMessage(message, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-message`;
            div.textContent = message;
            messageContainer.innerHTML = '';
            messageContainer.appendChild(div);
        }

        showMessage('ℹ️ Gib eine YouTube Playlist-URL ein (muss öffentlich sein)', 'info');
    </script>
</body>
</html>
